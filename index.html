<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEMES RX</title>

<style>
body {
  margin: 0;
  font-family: 'Arial';
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* خلفية Grid متحركة */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255,0,0,0.08) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,0,0,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveGrid 10s linear infinite;
  z-index: -1;
}

@keyframes moveGrid {
  0% { transform: translate(0,0); }
  100% { transform: translate(40px,40px); }
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
  animation: fadeDown 1s ease;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.logo span {
  color: #ff2d2d;
}

/* BUTTON */
.btn {
  background: #ff2d2d;
  padding: 10px 22px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 0 15px #ff2d2d88;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff2d2d;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 65px;
  margin: 0;
  animation: fadeUp 1s ease;
}

.hero span {
  color: #ff2d2d;
}

.hero p {
  color: #aaa;
  margin: 20px 0;
  animation: fadeUp 1.3s ease;
}

.badge {
  background: #ff2d2d22;
  display: inline-block;
  padding: 8px 18px;
  border-radius: 30px;
  margin-bottom: 20px;
  animation: fadeUp 0.8s ease;
}

.buttons a {
  margin: 10px;
  display: inline-block;
  animation: fadeUp 1.5s ease;
}

.btn-outline {
  border: 1px solid #555;
  padding: 10px 22px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn-outline:hover {
  background: white;
  color: black;
}

/* FOOTER */
footer {
  background: #000;
  padding: 50px 30px;
  margin-top: 100px;
}

.footer-container {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.footer h3 {
  margin-bottom: 10px;
}

.footer a {
  color: #aaa;
  text-decoration: none;
  display: block;
  margin: 5px 0;
}

.footer a:hover {
  color: white;
}

.footer-bottom {
  text-align: center;
  margin-top: 30px;
  color: #777;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<header>
  <div class="logo">THEMS-<span>RX</span></div>
  <a href="#" class="btn">تصفح القوالب</a>
</header>

<section class="hero">
  <div class="badge">🔥 منصة قوالب متاجر سلة الأولى</div>

  <h1>THEMS-<span>RX</span></h1>

  <p>حوّلي متجرك إلى تجربة فاخرة تزيد المبيعات وتجذب العملاء</p>

  <div class="buttons">
    <a href="#" class="btn">تصفح القوالب</a>
    <a href="#" class="btn-outline">ربط مع سلة</a>
  </div>
</section>

<footer class="footer">
  <div class="footer-container">
<div>

      0508047159
    </a>
  </p>
  <p>انستقرام: @rex.themes</p>
</div>
