<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEMES RX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050505;
  color: white;
}

/* GRID BG */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255,0,0,0.07) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,0,0,0.07) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveGrid 10s linear infinite;
  z-index: -1;
}

@keyframes moveGrid {
  100% { transform: translate(40px,40px); }
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo span { color: red; }

.btn {
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  box-shadow: 0 0 15px red;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 60px;
}

.hero span { color: red; }

/* THEMES */
.themes-container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 15px;
}

.card img {
  width: 100%;
  transition: 0.5s;
}

.card:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(transparent, black);
  opacity: 0;
  transition: 0.5s;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay a {
  background: red;
  padding: 8px 15px;
  border-radius: 5px;
  color: white;
  text-decoration: none;
}

/* FOOTER */
footer {
  background: black;
  padding: 40px;
  margin-top: 80px;
}

.footer-bottom {
  text-align: center;
  color: gray;
}
</style>
</head>

<body>

<header>
  <div class="logo">THEMES-<span>RX</span></div>
  <a href="#" class="btn">تصفح القوالب</a>
</header>

<section class="hero">
  <h1>THEMES-<span>RX</span></h1>
  <p>قوالب تحول متجرك إلى تجربة فاخرة</p>
</section>

<section class="themes-container">

  <div class="card">
    <img src="https://via.placeholder.com/400x300">
    <div class="overlay">
      <h3>Rose Beauty</h3>
      <a href="#">عرض</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x300">
    <div class="overlay">
      <h3>Luxury Store</h3>
      <a href="#">عرض</a>
    </div>
  </div>

  <div class="card">
    <img src="https://roooza-2026.base44.app/400x300">
    <div class="overlay">
      <h3>Modern Shop</h3>
      <a href="#">عرض</a>
    </div>
  </div>

</section>

<footer>
  <p>واتساب: <a href="https://wa.me/966508047159">0508047159</a></p>
  <div class="footer-bottom">
    © 2026 THEMES RX
  </div>
</footer>

</body>
</html>
