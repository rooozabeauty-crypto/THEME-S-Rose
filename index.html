<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>RX THEMES</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      direction: rtl;
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }
<section class="products">

  <h2>🔥 القوالب المميزة</h2>

  <div class="grid">

    <div class="card">
      <div class="img"></div>
      <h3>قالب متجر فاخر</h3>
      <p>تصميم أنيق لزيادة المبيعات</p>
      <a href="#" class="btn primary">معاينة</a>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>قالب عصري</h3>
      <p>سرعة + تجربة مستخدم عالية</p>
      <a href="#" class="btn primary">معاينة</a>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>قالب بسيط</h3>
      <p>مناسب للمبتدئين</p>
      <a href="#" class="btn primary">معاينة</a>
    </div>

  </div>

</section>
    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .logo span {
      color: #ff2d2d;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .browse-btn {
      background: #ff2d2d;
      padding: 10px 18px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 0 15px rgba(255,0,0,0.6);
      transition: 0.3s;
    }

    .browse-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255,0,0,1);
    }

    .icon {
      width: 35px;
      height: 35px;
      background: #ff2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 12px;
    }

    /* ===== HERO ===== */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: radial-gradient(circle at center, #1a0000, #000);
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255,0,0,0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,0,0,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      animation: fadeUp 1s ease;
    }

    .badge {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 20px;
      background: rgba(255,0,0,0.2);
      border: 1px solid rgba(255,0,0,0.4);
      margin-bottom: 20px;
      font-size: 14px;
    }

    h1 {
      font-size: 60px;
      margin: 10px 0;
    }

    h1 span {
      color: #ff2d2d;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    p {
      color: #aaa;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 10px;
      text-decoration: none;
      margin: 5px;
      display: inline-block;
    }

    .btn.primary {
      background: #ff2d2d;
      color: white;
      box-shadow: 0 0 25px rgba(255,0,0,0.8);
      transition: 0.3s;
    }

    .btn.primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(255,0,0,1);
    }

    .btn.secondary {
      border: 1px solid #555;
      color: #fff;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="logo">THEMS-<span>RX</span></div>

  <div class="left">
    <a href="#" class="browse-btn">تصفح القوالب</a>
    <div class="icon">TX</div>
  </div>

</header>

<!-- HERO -->
<section class="hero">
  <div class="content">

    <span class="badge">🔥 منصة قوالب متاجر سلة الأولى</span>

    <h1>THEMS-<span>RX</span></h1>

    <h2>قوالب تحول متجرك إلى تجربة لا تُنسى</h2>

    <p>
      أكثر من 500 قالب احترافي مصمم خصيصًا لمتاجر سلة لزيادة المبيعات وتحسين تجربة المستخدم
    </p>

    <div class="buttons">
      <a href="#" class="btn primary">تصفح القوالب</a>
      <a href="#" class="btn secondary">ربط مع سلة</a>
