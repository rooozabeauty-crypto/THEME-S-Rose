<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>THEMES RX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .logo span {
      color: red;
    }

    .btn {
      background: red;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero span {
      color: red;
    }

    .hero p {
      color: #aaa;
      margin: 20px 0;
    }

    .buttons a {
      margin: 10px;
      display: inline-block;
    }

    .btn-outline {
      border: 1px solid #555;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
    }

    /* FOOTER */
    footer {
      background: #000;
      padding: 40px 20px;
      margin-top: 80px;
    }

    .footer-container {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .footer h3 {
      margin-bottom: 10px;
    }

    .footer a {
      color: #aaa;
      text-decoration: none;
      display: block;
      margin: 5px 0;
    }

    .footer-bottom {
      text-align: center;
      margin-top: 20px;
      color: #777;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">THEMS-<span>RX</span></div>
    <a href="#" class="btn">تصفح القوالب</a>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>THEMS-<span>RX</span></h1>
    <p>قوالب تحول متجرك إلى تجربة لا تُنسى</p>

    <div class="buttons">
      <a href="#" class="btn">تصفح القوالب</a>
      <a href="#" class="btn-outline">ربط مع سلة</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-container">

      <div>
        <h3>THEMES RX</h3>
        <p>منصة قوالب احترافية لمتاجر سلة 🚀</p>
      </div>

      <div>
        <h3>روابط</h3>
        <a href="#">الرئيسية</a>
        <a href="#">القوالب</a>
        <a href="#">تواصل</a>
      </div>

      <div>
        <h3>تواصل</h3>
        <p>واتساب: 05XXXXXXXX</p>
        <p>انستقرام: @rex.themes</p>
      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 جميع الحقوق محفوظة</p>
    </div>
  </footer>

</body>
</html>
